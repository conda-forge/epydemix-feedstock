{% set name = "epydemix" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/epydemix-{{ version }}.tar.gz
  sha256: 19c8b9d933d335114d185414ab04e04860cd776178e197bf5bc34410747a2b4e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42
    - pip
  run:
    - python >={{ python_min }}
    - evalidate >=2.0.3
    - matplotlib-base >=3.7.3
    - numpy >=1.23.5
    - pandas >=2.0.3
    - scipy >=1.10.1
    - seaborn >=0.13.2
    - setuptools >=68.2.0

test:
  imports:
    - epydemix
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/epistorm/epydemix
  summary: A Python package for epidemic modeling, simulation, and calibration
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ngozzi
